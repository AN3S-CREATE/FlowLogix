# Load JSON dashboards from disk on startup.
apiVersion: 1

providers:
  - name: FlowLogix
    orgId: 1
    folder: FlowLogix
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
