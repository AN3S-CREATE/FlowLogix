name: Build & Deploy

# Production CI/CD: on every merge to main, verify the backend + frontend, then
# build and push the production container images to the GitHub Container Registry.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run compose health e2e (prod config validate + local datastores + GET /health)'
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }} # e.g. veralogix-group-innovation/flowlogix

jobs:
  # ---------------------------------------------------------------------------
  # 1) Lint + test both workspaces. Nothing is built or pushed unless this passes.
  # ---------------------------------------------------------------------------
  verify:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # --- Backend (NestJS) ---
      - name: Install backend deps
        working-directory: backend
        run: npm install

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Test backend (Jest)
        working-directory: backend
        run: npm test -- --ci

      # --- Frontend (Vite/React) ---
      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Test frontend (Vitest)
        working-directory: frontend
        run: npm test

      - name: Build frontend (type-check + bundle)
        working-directory: frontend
        run: npm run build

      # --- Mobile (offline sync module; vitest unit suite) ---
      - name: Install mobile deps
        working-directory: mobile
        run: npm install

      - name: Test mobile (Vitest)
        working-directory: mobile
        run: npm test

  # ---------------------------------------------------------------------------
  # 1b) Compose health e2e smoke (workflow_dispatch). Brings up local datastores
  #     + a one-shot API health check when secrets/images allow; otherwise runs
  #     compose config validation + curl against an optional STAGING_URL.
  # ---------------------------------------------------------------------------
  e2e-smoke:
    name: E2E smoke (compose health)
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'workflow_dispatch' && inputs.run_e2e == true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate prod compose file
        run: |
          # Minimal env so `config` interpolates without real secrets.
          cat > .env.prod.ci <<'EOF'
          REGISTRY=ghcr.io
          IMAGE_NAMESPACE=ci/flowlogix
          IMAGE_TAG=ci
          TLS_CERT_DIR=./deploy/certs
          CORS_ORIGIN=http://localhost
          LOG_LEVEL=info
          POSTGRES_USER=logixflow
          POSTGRES_PASSWORD=ci-postgres
          POSTGRES_DB=logixflow
          APP_DB_USER=logixflow_app
          APP_DB_PASSWORD=ci-app
          MONGO_USER=logixflow
          MONGO_PASSWORD=ci-mongo
          REDIS_PASSWORD=ci-redis
          GRAFANA_ADMIN_PASSWORD=ci-grafana
          JWT_SECRET=ci-jwt-secret-at-least-32-chars-long
          METRICS_SECRET=ci-metrics-secret-at-least-32-chars
          HEALTH_REQUIRE_MONGO=true
          EOF
          docker compose -f docker-compose.prod.yml --env-file .env.prod.ci config --quiet
          echo "docker-compose.prod.yml config OK"

      - name: Start local datastores
        run: docker compose up -d postgres redis mongodb

      - name: Wait for datastore health
        run: |
          for i in $(seq 1 30); do
            pg=$(docker inspect -f '{{.State.Health.Status}}' logixflow-postgres 2>/dev/null || echo starting)
            rd=$(docker inspect -f '{{.State.Health.Status}}' logixflow-redis 2>/dev/null || echo starting)
            mg=$(docker inspect -f '{{.State.Health.Status}}' logixflow-mongodb 2>/dev/null || echo starting)
            echo "postgres=$pg redis=$rd mongo=$mg"
            if [ "$pg" = "healthy" ] && [ "$rd" = "healthy" ] && [ "$mg" = "healthy" ]; then
              exit 0
            fi
            sleep 2
          done
          echo "Datastores did not become healthy in time"
          docker compose ps
          exit 1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install + build backend
        working-directory: backend
        run: |
          npm install
          npm run build

      - name: Start API and curl /health
        working-directory: backend
        env:
          NODE_ENV: development
          PORT: '3000'
          POSTGRES_HOST: localhost
          POSTGRES_PORT: '5432'
          POSTGRES_USER: logixflow
          POSTGRES_PASSWORD: logixflow
          POSTGRES_DB: logixflow
          APP_DB_USER: logixflow
          APP_DB_PASSWORD: logixflow
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
          MONGO_URI: mongodb://logixflow:logixflow@localhost:27017/?authSource=admin
          JWT_SECRET: ci-e2e-jwt-secret-at-least-32-chars
          HEALTH_REQUIRE_MONGO: 'true'
        run: |
          # Migrations may require app role — seed path varies; health only needs SELECT 1.
          node dist/main &
          API_PID=$!
          trap 'kill $API_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:3000/health | grep -q '"status":"ok"'; then
              echo "GET /health ok"
              curl -sf http://127.0.0.1:3000/health | head -c 500
              echo
              exit 0
            fi
            sleep 2
          done
          echo "API /health did not become ok"
          curl -sv http://127.0.0.1:3000/health || true
          exit 1

      - name: Tear down datastores
        if: always()
        run: docker compose down -v

  # ---------------------------------------------------------------------------
  # 2) Build the production images and push them to GHCR. Only runs on a real
  #    merge to main (not on manual re-verify), and only after `verify` is green.
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & push images
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write # required to push to GHCR with the built-in GITHUB_TOKEN
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # scoped, short-lived; no PAT needed

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-${{ matrix.name }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
