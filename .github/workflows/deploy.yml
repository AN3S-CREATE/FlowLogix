name: Build & Deploy

# Production CI/CD: on every merge to main, verify the backend + frontend, then
# build and push the production container images to the GitHub Container Registry.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }} # e.g. veralogix-group-innovation/flowlogix

jobs:
  # ---------------------------------------------------------------------------
  # 1) Lint + test both workspaces. Nothing is built or pushed unless this passes.
  # ---------------------------------------------------------------------------
  verify:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # --- Backend (NestJS) ---
      - name: Install backend deps
        working-directory: backend
        run: npm install

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Test backend (Jest)
        working-directory: backend
        run: npm test -- --ci

      # --- Frontend (Vite/React) ---
      - name: Install frontend deps
        working-directory: frontend
        run: npm install

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend (type-check + bundle)
        working-directory: frontend
        run: npm run build

  # ---------------------------------------------------------------------------
  # 2) Build the production images and push them to GHCR. Only runs on a real
  #    merge to main (not on manual re-verify), and only after `verify` is green.
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & push images
    needs: verify
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write # required to push to GHCR with the built-in GITHUB_TOKEN
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # scoped, short-lived; no PAT needed

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-${{ matrix.name }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
