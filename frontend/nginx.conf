# FlowLogix edge: Nginx serves the React SPA and load-balances the API.
#
# One process fronts everything: it terminates TLS, serves the static bundle,
# and round-robins REST + Socket.io traffic across the three NestJS replicas.

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # JSON access log so the edge logs aggregate the same way as the app's
  # structured stdout logs.
  log_format json_combined escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"method":"$request_method",'
      '"uri":"$request_uri",'
      '"status":$status,'
      '"upstream":"$upstream_addr",'
      '"request_time":$request_time,'
      '"upstream_response_time":"$upstream_response_time"'
    '}';
  access_log /var/log/nginx/access.log json_combined;

  sendfile      on;
  tcp_nopush    on;
  keepalive_timeout  65;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

  # --- API upstream: the 3 NestJS replicas, round-robin (Nginx default) ---
  # Docker's embedded DNS resolves `api` to all three replica IPs; listing the
  # compose service names keeps the pool explicit and health-checked.
  upstream flowlogix_api {
    server api1:3000 max_fails=3 fail_timeout=15s;
    server api2:3000 max_fails=3 fail_timeout=15s;
    server api3:3000 max_fails=3 fail_timeout=15s;
    keepalive 32;
  }

  # Map the Upgrade header so WebSocket connections proxy correctly.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # Redirect all plain HTTP to HTTPS.
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # --- TLS terminating edge ---
  server {
    listen 443 ssl;
    http2 on;
    server_name _; # single-domain edge; catch-all avoids build-time templating

    # Certificates are mounted from the host (see docker-compose.prod.yml).
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    # Mozilla "intermediate" cipher suite (forward-secret AEAD only).
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Baseline security headers for the SPA (clickjacking, MIME-sniffing, HSTS).
    add_header X-Frame-Options        "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # --- REST API -> round-robin backend pool ---
    location /api/ {
      proxy_pass         http://flowlogix_api/;
      proxy_http_version 1.1;
      # Clear Connection so the upstream `keepalive` pool is actually reused.
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # --- Socket.io realtime gateway (namespace /realtime) ---
    # WebSocket upgrade headers are required; broadcasts fan out across replicas
    # via the Redis pub/sub adapter, so plain round-robin is safe here.
    location /socket.io/ {
      proxy_pass         http://flowlogix_api;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection $connection_upgrade;
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_read_timeout 3600s; # long-lived sockets
    }

    # --- Static SPA (client-side routing falls back to index.html) ---
    location / {
      root      /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
    }
  }
}
